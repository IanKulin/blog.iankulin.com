baseURL = "https://devendevour.iankulin.com"
title   = "blog.iankulin.com"
theme   = "zen"
locale  = "en-AU"

enableRobotsTXT = true
buildDrafts     = false
buildFuture     = false

[pagination]
  pagerSize = 20

[markup.goldmark.renderer]
  unsafe = true          # posts contain raw HTML from the WordPress migration

[permalinks]
  posts = "/:slug/"

[taxonomies]
  tag = "tags"

[params]
  logo         = false
  description  = "web dev - homelab - iOS dev"
  dateformat   = "2 January, 2006"
  submitted    = true
  mainSections = ["posts"]
  poweredby    = false
  feedlinks    = true

  [params.author]
    name = "ian"

[[menu.main]]
name   = "about/"
url    = "/about/"
weight = 1

[[menu.main]]
name   = "posts/"
url    = "/posts/"
weight = 2

[[menu.main]]
name   = "tags/"
url    = "/tags/"
weight = 3
