baseURL = "https://devendevour.iankulin.com"
title   = "dev.endevour"
theme   = "zen"
locale  = "en-AU"

enableRobotsTXT = true
buildDrafts     = false
buildFuture     = false

[pagination]
  pagerSize = 20

[markup.goldmark.renderer]
  unsafe = true          # posts contain raw HTML from the WordPress migration

[permalinks]
  posts = "/:slug/"

[taxonomies]
  tag = "tags"

[params]
  logo         = false
  description  = "iOS dev - web dev - homelab"
  dateformat   = "2 January, 2006"
  submitted    = true
  mainSections = ["posts"]
  poweredby    = false
  feedlinks    = true

  [params.author]
    name = "ian"

[[menu.main]]
name   = "about/"
url    = "/about/"
weight = 1

[[menu.main]]
name   = "posts/"
url    = "/posts/"
weight = 2

[[menu.main]]
name   = "tags/"
url    = "/tags/"
weight = 3

[[menu.main]]
name   = "glossary/"
url    = "/glossary/"
weight = 4

[[menu.main]]
name   = "web-dev-links/"
url    = "/web-development-links/"
weight = 5
