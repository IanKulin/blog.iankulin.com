{{ define "main" -}}
<main class="main layout__main">
  <header>
    <h1 class="title">{{ .Title }}</h1>
  </header>
  {{ .Content }}
  {{ $paginator := .Paginate (where .Pages "Params.private" "!=" true) -}}
  {{ range $paginator.Pages -}}
    {{ .Render "summary" }}
  {{ end -}}
  {{ partial "pagination-lite.html" . }}
</main>
{{ end -}}
